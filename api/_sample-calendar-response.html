<!-- 
  Sample response from: POST /chalkpadpro/studentDetails/getAttendanceRegister
  Body: studentId=9508
  
  Also expected from: POST /mobile/commonPage with commonPageId=85 (mobile API equivalent)
  
  STRUCTURE:
  - Each subject has its own <thead> + <tbody> pair
  - <thead> second <tr>: first <th> = "Subject Name\n(SubjectCode)", rest = "N\nDD-MM\nPeriod"
  - <tbody> <tr id='subject_{erpSubjectId}'>: 
      - First <td>: "Attendance Count"
      - Cell ID: subject_{erpSubjectId}_{YYYY}_{MM}_{DD}_{period}
      - Cell value: Number = PRESENT (running count), "X" = ABSENT
      - Second-to-last <td class='total_{id}'>: "attended/total" (e.g. "73/89")
      - Last <td class='percent_{id}'>: "NN.NN%" (e.g. "82.02%")
-->
